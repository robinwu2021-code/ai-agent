name: agent_bi
version: "3.0.0"
description: >
  查询门店BI报表数据。支持六种模式（自动路由）：
  ① 默认汇总（营业额/订单/顾客等26项指标）；
  ② 粒度分组（按天/月/年展开，传 time_granularity）；
  ③ 菜品销量排行（dimensions=dish_top）；
  ④ 库存不足商品列表（dimensions=low_stock）；
  ⑤ 储值充值与余额统计（dimensions=stored_value_time_range）；
  ⑥ 新增储值会员统计（dimensions=member_info_time_range）。
  支持同比(yoy)/环比(pop)对比分析。
  API: https://fnb-qrcode.neargo.ai/v1/report/agent_bi
author: "ai-agent"
tags: ["report", "bi", "analytics", "business", "sales", "inventory", "member"]
permission: network
timeout_ms: 30000
entrypoint: AgentBiSkill
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: ["query"]
      description: "操作类型，固定为 query"
    metrics:
      type: array
      minItems: 1
      items:
        type: string
        enum:
          - turnover
          - actual_income
          - actual_income_no_tips
          - tips_amount
          - order_quantity
          - average_order_price
          - customer_number
          - dining_room_amount
          - togo_amount
          - store_delivery_amount
          - discount_amount
          - discount_ratio
          - member_quantity
          - new_member_number
          - first_member_number
          - second_member_number
          - regular_member_number
          - refund_amount
          - refunded_quantity
          - pay_by_cash
          - pay_by_card
          - pay_by_online
          - pay_by_savings
          - pos_amount
          - amount_not_taxed
          - vat
      description: >
        默认/粒度模式下的指标字段列表（至少一个）。
        菜品排行/库存/储值/会员兼容模式下可省略（或传对应触发字段）。
    bra_id:
      type: string
      description: "门店ID，不传则使用配置默认值"
    aggregation:
      type: string
      enum: [SUM, AVG, MAX, MIN, COUNT]
      default: SUM
      description: "聚合函数（默认 SUM）。粒度模式必传；菜品/库存模式无效"
    dimensions:
      type: string
      enum:
        - trend
        - product_top
        - dish_top
        - low_stock
        - inventory_low
        - stored_value_time_range
        - member_credit_time_range
        - member_info_time_range
        - new_member_time_range
      description: >
        维度参数，控制查询模式：
        trend/time_range → 时间维度（储值/会员按天展开）；
        product_top/dish_top → 菜品销量排行；
        low_stock/inventory_low → 库存不足商品列表；
        stored_value_time_range → 储值统计按天展开；
        member_info_time_range → 新会员统计按天展开
    time_granularity:
      type: string
      enum: [DAY, MONTH, YEAR]
      description: >
        查询粒度（优先级高于 dimensions）。
        DAY=按日分组，MONTH=按月分组，YEAR=按年分组。
        使用时 aggregation 必传，返回结果含 period 字段。
        示例：近一个月每天营业额趋势 → time_granularity=DAY + aggregation=SUM
    stock_threshold:
      type: integer
      description: "库存阈值（仅 low_stock 模式有效），库存 ≤ 此值的商品会被列出，默认 5"
    range_start:
      type: integer
      description: "统计开始时间（13位毫秒时间戳，每日凌晨00:00:00）"
    range_end:
      type: integer
      description: "统计结束时间（13位毫秒时间戳，每日凌晨00:00:00）。单日：range_end = range_start + 86400000"
    comparison:
      type: string
      enum: [yoy, pop]
      description: >
        对比模式（可选）：
        yoy = 同比（与去年同期对比）；
        pop = 环比（与上一时段对比）。
        仅当用户明确要求同比/环比时设置，不与菜品/库存模式同时使用
  required: [action]
