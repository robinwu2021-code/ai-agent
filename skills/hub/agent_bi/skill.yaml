name: agent_bi
version: "2.0.0"
description: "查询门店BI报表数据（销售额/营业额、订单数、顾客数、支付方式、会员、退款等）。当用户询问销售数据、营业额、订单量时必须调用此工具。API: https://fnb-qrcode.neargo.ai/v1/report/agent_bi"
author: "ai-agent"
tags: ["report", "bi", "analytics", "business", "sales"]
permission: network
timeout_ms: 15000
entrypoint: AgentBiSkill
input_schema:
  type: object
  properties:
    action:
      type: string
      enum: ["query"]
      description: "操作类型，目前支持 query"
    metrics:
      type: array
      minItems: 1
      items:
        type: string
        enum:
          - turnover
          - actual_income
          - actual_income_no_tips
          - tips_amount
          - order_quantity
          - average_order_price
          - customer_number
          - dining_room_amount
          - togo_amount
          - store_delivery_amount
          - discount_amount
          - discount_ratio
          - member_quantity
          - new_member_number
          - first_member_number
          - second_member_number
          - regular_member_number
          - refund_amount
          - refunded_quantity
          - pay_by_cash
          - pay_by_card
          - pay_by_online
          - pay_by_savings
          - pos_amount
          - amount_not_taxed
          - vat
      description: "要查询的指标字段列表（至少一个）"
    bra_id:
      type: string
      description: "门店ID，不传则查询所有门店"
    aggregation:
      type: string
      enum: [SUM, AVG, MAX, MIN, COUNT]
      default: SUM
      description: "聚合函数（默认 SUM）"
    range_start:
      type: integer
      description: "统计开始时间（13位毫秒时间戳，每日凌晨00:00:00）"
    range_end:
      type: integer
      description: "统计结束时间（13位毫秒时间戳，每日凌晨00:00:00）"
  required: [action, metrics]
