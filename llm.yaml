# llm.yaml — LLM 引擎实例配置
#
# 优先级：llm.yaml > 环境变量(ENGINE_ALIASES) > LLM_* 单引擎变量
#
# 值支持 ${ENV_VAR} 语法做环境变量插值，api_key 等敏感信息建议通过此方式引入，
# 不要将真实密钥直接写入此文件。
#
# 将此文件复制为 llm.yaml 并按需修改，或通过 LLM_CONFIG_FILE 指定其他路径。
# ----------------------------------------------------------------------

engines:

  # ── Anthropic Claude（主账号，旗舰模型）─────────────────────────
  - alias: claude-smart
    sdk: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-20250514
    max_tokens: 8192
    cost_tier: 2
    supports_tools: true
    tags: [primary, reasoning]

  # ── Anthropic Claude（快速/低成本模型）──────────────────────────
  - alias: claude-fast
    sdk: anthropic
    api_key: ${ANTHROPIC_API_KEY}          # 同账号不同模型，共享同一 key
    model: claude-haiku-4-5-20251001
    max_tokens: 4096
    cost_tier: 1
    tags: [fast, summarize]

  # ── Anthropic Claude（备用账号，用于容灾或隔离配额）────────────
  # - alias: claude-backup
  #   sdk: anthropic
  #   api_key: ${ANTHROPIC_API_KEY_BACKUP}  # 不同账号，不同 key
  #   model: claude-sonnet-4-20250514
  #   cost_tier: 2
  #   tags: [backup]

  # ── Azure OpenAI（东区部署，支持 Embedding）────────────────────
  # - alias: azure-east
  #   sdk: openai_compatible
  #   api_key: ${AZURE_API_KEY_EAST}
  #   base_url: https://my-east.openai.azure.com/openai/deployments/gpt4o
  #   model: gpt-4o
  #   is_azure: true
  #   azure_api_version: "2024-02-01"
  #   supports_embed: true
  #   cost_tier: 2
  #   tags: [azure, embed]

  # ── Azure OpenAI（西区备用部署，不同 key 和地址）──────────────
  # - alias: azure-west
  #   sdk: openai_compatible
  #   api_key: ${AZURE_API_KEY_WEST}        # 不同账号/订阅，不同 key
  #   base_url: https://my-west.openai.azure.com/openai/deployments/gpt4o-mini
  #   model: gpt-4o-mini
  #   is_azure: true
  #   cost_tier: 1
  #   tags: [azure, backup]

  # ── DeepSeek（OpenAI 兼容接口）─────────────────────────────────
  # - alias: deepseek-chat
  #   sdk: openai_compatible
  #   api_key: ${DEEPSEEK_API_KEY}
  #   base_url: https://api.deepseek.com/v1
  #   model: deepseek-chat
  #   cost_tier: 1
  #   tags: [cheap, fallback]

  # ── Groq（超快推理）────────────────────────────────────────────
  # - alias: groq-fast
  #   sdk: openai_compatible
  #   api_key: ${GROQ_API_KEY}
  #   base_url: https://api.groq.com/openai/v1
  #   model: llama-3.3-70b-versatile
  #   cost_tier: 1
  #   tags: [fast, fallback]

  # ── Ollama 本地推理（qwen3，无需 key）──────────────────────
  - alias: ollama-qwen3
    sdk: openai_compatible
    base_url: http://192.168.0.222:11434/v1
    model: qwen3.5:35b-a3b
    embedding_model: ""              # 推理引擎不做 embedding，由 ollama-embed 专属处理
    max_tokens: 8192
    timeout_sec: 300.0               # 本地大模型推理较慢，适当放大超时
    cost_tier: 0
    supports_tools: true
    supports_embed: false
    tags: [local, offline, qwen]

  # ── Ollama 本地 Embedding（qwen3-embedding:8b）─────────────
  # 安装：ollama pull qwen3-embedding:8b
  - alias: ollama-embed
    sdk: openai_compatible
    base_url: http://192.168.0.222:11434/v1
    model: qwen3-embedding:8b        # 主模型字段（有些 Ollama 版本兼容）
    embedding_model: qwen3-embedding:8b
    max_tokens: 4096
    timeout_sec: 60.0
    cost_tier: 0
    supports_tools: false
    supports_embed: true
    tags: [local, embed, qwen]

  # ── vLLM 本地（qwen3.5:35b-b，OpenAI 兼容接口）─────────────
  - alias: vllm-qwen3
    sdk: openai_compatible
    base_url: http://192.168.0.222:8000/v1
    model: qwen3.5:35b-a3b             # 与 vLLM --served-model-name 保持一致
    api_key: EMPTY                   # vLLM 默认不校验 key，填占位符即可
    max_tokens: 8192
    timeout_sec: 300.0
    cost_tier: 0
    supports_tools: true
    tags: [local, vllm, qwen]


router:
  # 所有未覆盖任务类型的回落引擎
  default: claude-smart

  # ── 按任务类型路由（留空则回落 default）──────────────────────
  chat: claude-smart          # 主推理对话（ReAct 循环）
  plan: claude-smart          # Plan-Execute 规划阶段
  summarize: claude-fast      # 文本摘要/上下文裁剪（用便宜模型）
  consolidate: claude-fast    # 记忆固化提炼
  embed: ollama-embed         # 向量化 → 本地 qwen3-embedding:8b（离线可用，0成本）
  # embed: azure-east         # 若需 OpenAI embedding 取消注释并注释上行
  # eval: claude-fast         # LLM-as-judge 打分
  # route: claude-fast        # Multi-Agent 路由决策

  # ── Fallback 链（主引擎失败后按序尝试）──────────────────────
  fallback:
    - claude-fast
    # - deepseek-chat
    # - groq-fast

  # ── 工作流节点级覆盖（比任务类型更细粒度，可选）─────────────
  # node_overrides:
  #   react_final: claude-smart     # 最后一步用旗舰模型
  #   plan_generate: claude-smart   # 生成计划用旗舰模型


# ══════════════════════════════════════════════════════════════════
# vector_store — 向量数据库配置
#
# backend 可选值：
#   milvus  — 推荐，原生 BM25 稀疏向量 + 内置 RRFRanker，支持远程服务器
#   qdrant  — 备选，HNSW + Python 端 BM25，支持嵌入式 / 服务器模式
#   sqlite  — 兜底，纯 Python numpy 检索，无需额外依赖（小数据量可用）
#
# 值支持 ${ENV_VAR} 语法做环境变量插值（敏感信息建议通过此方式引入）
# ══════════════════════════════════════════════════════════════════

vector_store:
  backend: milvus

  milvus:
    uri: http://192.168.0.209:19530      # Milvus Standalone 服务器地址
    token: root:${MILVUS_PASSWORD}               # 格式：root:密码 或 API key（无鉴权可留空）
    collection: kb_chunks                # collection 名称，同一服务可部署多个项目
    vector_size: 1536                    # 必须与 embedding 模型输出维度一致
                                         # qwen3-embedding:8b → 1536
                                         # text-embedding-3-small → 1536
                                         # text-embedding-3-large → 3072
    index_type: HNSW                     # HNSW（默认，适合 <500万向量）
                                         # DISKANN（超大规模，磁盘 ANN，省内存）

  # ── Qdrant 备选后端（注释上面的 milvus 节并启用此节切换）─────
  # qdrant:
  #   url: http://192.168.0.222:6333     # Qdrant 服务器地址
  #   api_key: ${QDRANT_API_KEY}
  #   collection: kb_chunks
  #   vector_size: 1536


# ══════════════════════════════════════════════════════════════════
# memory — 记忆系统配置
#
# 关键设计：llm_engine / embed_engine / summarize_engine / engine
# 全部引用上方 engines: 节中已定义的 alias，无需重复填写连接参数。
#
# 切换 LLM 后端只需改 alias 名，一行搞定：
#   本地 Ollama:    llm_engine: ollama-qwen3
#   本地 vLLM:      llm_engine: vllm-qwen3
#   云端 Claude:    llm_engine: claude-fast
#   云端 OpenAI:    llm_engine: gpt-4o-mini   （engines: 节新增实例即可）
# ══════════════════════════════════════════════════════════════════

memory:

  # ── 短期记忆 (STM) ───────────────────────────────────────────
  stm:
    backend: redis                  # redis | in_memory
    redis_url: ${REDIS_URL}         # 未设置环境变量时降级 in_memory
    ttl_idle: 1800                  # 不活跃 30 分钟 TTL（秒）
    ttl_max:  86400                 # 最长保留 24 小时（防止冷数据堆积）

  # ── 长期记忆 (LTM) ───────────────────────────────────────────
  ltm:
    backend: mem0                   # mem0 | milvus | qdrant | zep | in_memory

    # ── LLM 引擎：引用 engines 节 alias，无需重复配置 ──────────
    llm_engine:   ollama-qwen3      # 用于 mem0 内部记忆提取/去重判断
    embed_engine: ollama-embed      # 用于向量化存储与语义检索

    # ── 切换示例（取消注释即生效）─────────────────────────────
    # llm_engine: vllm-qwen3        # 改为本地 vLLM（推理更快）
    # llm_engine: claude-fast       # 改为云端 Claude Haiku（质量更高）
    # llm_engine: claude-smart      # 改为旗舰模型（成本高，质量最好）
    # embed_engine: ollama-embed    # 本地 qwen3-embedding:8b（默认）

    # ── 向量库（复用顶层 vector_store 节，独立 collection）─────
    use_global_vector_store: true   # true → 复用本文件 vector_store: 节配置
    collection: agent_memory        # 与 KB 的 kb_chunks 完全隔离

    # ── mem0 专项参数 ─────────────────────────────────────────
    mem0:
      dedup_threshold: 0.85         # 语义相似度 > 此值视为重复（更新而非新增）
      max_memories: 10000           # 每用户最大记忆条数

    # ── Zep 配置（backend: zep 时生效）──────────────────────────
    # zep_server_url: http://192.168.0.x:8000
    # zep_api_key: ${ZEP_API_KEY}

  # ── 工作记忆（Context 组装）────────────────────────────────
  working:
    # 历史压缩使用廉价快速模型，节省 token 成本
    summarize_engine: claude-fast   # 空字符串 → 使用 router.summarize 默认路由
    # summarize_engine: ollama-qwen3   # 离线优先，不依赖云端
    # summarize_engine: vllm-qwen3     # 切换到 vLLM

    token_budget: 12000             # 总 context token 预算
    compress_threshold: 1500        # 历史超出此 token 数时触发 LLM 摘要压缩
    ltm_score_min: 0.05             # LTM 召回低于此分数的条目不注入 context

  # ── 记忆固化（Consolidation）────────────────────────────────
  consolidation:
    # 固化提取使用廉价模型（提取结构化事实，无需强推理能力）
    engine: claude-fast             # 空字符串 → 使用 router.consolidate 默认路由
    # engine: ollama-qwen3          # 切换到本地 Ollama
    # engine: vllm-qwen3            # 切换到本地 vLLM

    incremental_every: 10           # 每 N 条新消息触发增量固化（防崩溃丢失）
    segment_size: 20                # 每次处理的消息段大小
    min_importance: 0.2             # 低于此重要性的 fact 直接丢弃
