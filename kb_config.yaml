# kb_config.yaml — 知识库组件配置
#
# 设计原则：
#   - LLM / Embedding 引擎参数（api_key / base_url / model）统一在 llm.yaml 管理
#   - 本文件通过 alias 直接引用 llm.yaml engines 节中已定义的引擎，不重复填写连接参数
#   - 向量库连接参数优先使用 llm.yaml vector_store 节，本文件仅做业务层覆盖
#
# 切换引擎只需修改此处 alias（llm.yaml 里对应引擎的连接参数保持不变）：
#   embed_engine: ollama-embed   → llm.yaml engines[ollama-embed]  qwen3-embedding:8b（远程 Ollama，4096 维）
#   embed_engine: qwen3_local    → 本机 Python 直接推理 qwen3-embedding:4b（2560 维，不走 llm.yaml）
#   embed_engine: bge_local      → 本机 Python 直接推理 BGE-M3（1024 维，不走 llm.yaml）
#   embed_engine: azure-east     → llm.yaml engines[azure-east]   Azure text-embedding-3-small
#
# ⚠ 切换 embedding 模型注意事项（各模型维度不同，不可混用）：
#   1. 同步修改下方 embed_engine 和 embed_dimensions
#   2. 同步修改 llm.yaml → vector_store.milvus.vector_size
#   3. 删除旧 Milvus collection（kb_chunks），否则会出现维度不匹配错误
#   4. 重新上传所有文档以重建向量索引
# ─────────────────────────────────────────────────────────────────────

knowledge_base:

  # ── LLM / Embedding 引擎引用 ─────────────────────────────────────
  # alias 直接对应 llm.yaml engines 节中的 alias 字段
  # 连接参数（api_key / base_url / model / timeout）全部在 llm.yaml 中管理
  llm:
    # ▼ 直接引用 llm.yaml engines 中已定义的 alias ▼
    #
    # ── 当前激活的 Embedding 引擎 ──────────────────────────────────────────
    # 若要切换到轻量 4b 模型，将下面两行改为：
    #   embed_engine:     ollama-embed-4b
    #   embed_dimensions: 2560
    # 并同步修改 llm.yaml vector_store.milvus.vector_size: 2560
    # 然后删除旧 collection 并重新上传文档
    embed_engine:     ollama-embed      # qwen3-embedding:8b → 4096 维（远程 Ollama，高质量）
    # embed_engine:   qwen3_local       # qwen3-embedding:4b → 2560 维（本机 Python 直接推理）
    # embed_engine:   bge_local         # BGE-M3 → 1024 维（本机 Python 直接推理）
    summarize_engine: minimax           # llm.yaml engines[minimax] → MiniMax-M2.5
    rerank_engine:    minimax           # llm.yaml engines[minimax] → 同上

    # Embedding 维度 — 须与 embed_engine 的模型输出维度一致
    # 同时须与 llm.yaml vector_store.milvus.vector_size 保持一致
    embed_dimensions: 4096              # ollama-embed(8b)  → 4096
    # embed_dimensions: 2560            # qwen3_local(4b)   → 2560
    # embed_dimensions: 1024            # bge_local(BGE-M3) → 1024
    embed_batch_size: 32                # 每批次请求数量

    # 本地 BGE（仅 embed_engine: bge_local 时生效，Python 直接推理，不走 llm.yaml）
    bge_local:
      model: BAAI/bge-m3
      device: cpu
      batch_size: 16

    # 本地 Qwen3-Embedding 4b（仅 embed_engine: qwen3_local 时生效，Python 直接推理）
    # 安装：pip install transformers torch
    # 模型：ollama pull qwen3-embedding:4b 或 huggingface-cli download Qwen/Qwen3-Embedding-4B
    qwen3_local:
      model: Qwen/Qwen3-Embedding-4B   # HuggingFace ID 或本地绝对路径
      device: cpu                       # cpu | cuda | mps
      batch_size: 16
      max_length: 512
      dimensions: 2560                  # qwen3-embedding:4b 输出维度

  # ── 文档解析 ─────────────────────────────────────────────────────
  parser:
    backend: docling               # docling | unstructured | markitdown
    docling:
      do_ocr: true
      do_table_structure: true
      table_mode: accurate         # accurate | fast
      ocr_lang: [zh, en]
    unstructured:
      strategy: hi_res             # hi_res | fast | auto
      api_url: ""
      api_key: ""
    markitdown:
      enable_plugins: true

  # ── 分块策略 ─────────────────────────────────────────────────────
  chunker:
    strategy: auto                       # auto | structural | semantic | sentence | fixed
    # auto: 有标题→structural，无标题→semantic
    structural:
      min_size: 100
      max_size: 800
      levels: [1, 2, 3]
      include_heading: true
    semantic:
      backend: chonkie
      threshold: 0.5
      target_size: 512
      max_size: 800
    sentence:
      chunk_size: 512
      chunk_overlap: 64
    fixed:
      chunk_size: 512
      chunk_overlap: 64
    contextual_enhancement:
      enabled: true                # Phase 1 开启：LLM 为每个 chunk 生成上下文描述
                                   # ⚠ 会增加 LLM 调用次数（每 chunk 调用一次），首次索引较慢
      use_prompt_cache: true
      batch_size: 10
      prompt: "请用1-2句话描述以下片段的主题和关键信息，不要复述原文：\n{chunk_text}"

    # ── 分块摘要（原语言）────────────────────────────────────────
    # 开启后对每个 chunk 调用 LLM 生成 1-2 句原语言摘要，
    # 摘要向量单独存入 Milvus dense_vec_summary 字段，检索时覆盖更多语义角度。
    # ⚠ 首次启用前须删除旧 collection（新 schema 含 dense_vec_summary + summary 字段）
    chunk_summary:
      enabled: true                # Phase 1 开启：每个 chunk 生成摘要向量，扩大语义覆盖
                                   # ⚠ 会增加 LLM 调用次数，首次启用前须删除旧 collection（schema 变更）
      max_chars: 800
      concurrency: 8

  # ── 向量存储 ─────────────────────────────────────────────────────
  # use_global=true 时优先使用 llm.yaml vector_store 节的连接参数
  # collection 字段可覆盖 llm.yaml 中的 collection 名称
  vector_store:
    use_global: true               # true = 优先使用 llm.yaml vector_store 配置
    collection: kb_chunks          # 覆盖 llm.yaml 的 collection（留空则用 llm.yaml 原值）
    # ── 以下配置仅在 use_global=false 或 llm.yaml 无 vector_store 时生效 ──
    backend: qdrant                # qdrant | milvus | chroma
    qdrant:
      mode: embedded               # embedded | server
      path: ./data/qdrant
      url: http://localhost:6333
    milvus:
      mode: lite                   # lite(本地文件) | standalone(服务器)
      uri: ./data/milvus.db
    chroma:
      mode: persistent
      path: ./data/chroma

  # ── 关键词检索（BM25）───────────────────────────────────────────
  keyword_store:
    # ── 关键词检索后端 ───────────────────────────────────────────────────────
    # memory: 内存 BM25（默认，无需额外服务）
    # elasticsearch: ES 增强检索（多字段加权 + 短语匹配，推荐生产使用）
    #   切换步骤：1. 启动 ES 服务  2. 将 backend 改为 elasticsearch  3. 重新索引文档
    #   ES 安装：docker run -d -p 9200:9200 -e "discovery.type=single-node" elasticsearch:8.13.0
    #   中文分词：安装 analysis-ik 插件后 analyzer 改为 ik_max_word
    backend: memory                # elasticsearch | opensearch | memory
    elasticsearch:
      url: http://localhost:9200
      index_prefix: kb_
      username: ""
      password: ""
      analyzer: ik_max_word        # ik_max_word（中文）| standard
    opensearch:
      url: http://localhost:9200
      index_prefix: kb_
      username: ""
      password: ""
    memory:
      persist: true
      path: ./data/bm25.pkl

  # ── 知识图谱 ─────────────────────────────────────────────────────
  graph:
    enabled: true
    per_document: true
    workspace_level: true
    # Phase 2: 三元组抽取最低置信度（0.5 过滤低质量关系，原为 0.3）
    # 对应 TripleExtractor(min_confidence=0.5)，提高图谱质量
    store:
      backend: sqlite              # neo4j | sqlite | memory
      neo4j:
        uri: bolt://localhost:7687
        user: neo4j
        password: password
        database: neo4j
      sqlite:
        path: ./data/graph.db
    builder:
      extract_entities: true
      extract_relations: true
      resolve_entities: true
      build_communities: true

  # ── 重排序 ───────────────────────────────────────────────────────
  reranker:
    enabled: true
    backend: llm                   # bge | cohere | llm | none
    top_n: 5
    bge:
      model: BAAI/bge-reranker-v2-m3
      device: cpu
    cohere:
      model: rerank-multilingual-v3.0
      api_key: ""

  # ── 混合检索融合参数 ─────────────────────────────────────────────
  retrieval:
    vector_top_k: 20
    keyword_top_k: 20
    graph_top_k: 10
    fusion: rrf                    # rrf（Reciprocal Rank Fusion）| weighted
    rrf_k: 60
    weights:
      vector: 0.45                 # Phase 1 调整：向量检索权重（原 0.5）
      keyword: 0.35                # Phase 1 调整：关键词检索权重（原 0.3）
      graph: 0.20                  # 知识图谱权重（不变）
    enable_graph_retrieval: true

  # ── 权限管理 ─────────────────────────────────────────────────────
  permissions:
    enabled: true
    db:
      backend: sqlite
      url: ./data/workspace.db

  # ── 文件管理 ─────────────────────────────────────────────────────
  file_management:
    db_url: ./data/kb_files.db
    storage:
      base_path: ./data/files
      keep_versions: 10            # 保留最近 N 个历史版本原始文件；0=不保留
    summary:
      enabled: true
      generate_diff: true
      max_input_chars: 3000
    audit:
      retention_days: 365          # 0 = 永久保留
