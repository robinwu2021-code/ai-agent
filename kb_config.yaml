# kb_config.yaml — 知识库组件配置
#
# 设计原则：
#   - LLM / Embedding 引擎参数（api_key / base_url / model）统一在 llm.yaml 管理
#   - 本文件通过 alias 直接引用 llm.yaml engines 节中已定义的引擎，不重复填写连接参数
#   - 向量库连接参数优先使用 llm.yaml vector_store 节，本文件仅做业务层覆盖
#
# 切换引擎只需修改此处 alias（llm.yaml 里对应引擎的连接参数保持不变）：
#   embed_engine: ollama-embed    → llm.yaml engines[ollama-embed]  本地 qwen3-embedding:8b
#   embed_engine: azure-east      → llm.yaml engines[azure-east]   Azure text-embedding-3-small
#   embed_engine: bge_local       → 本地 BGE-M3（离线推理，不走 llm.yaml）
# ─────────────────────────────────────────────────────────────────────

knowledge_base:

  # ── LLM / Embedding 引擎引用 ─────────────────────────────────────
  # alias 直接对应 llm.yaml engines 节中的 alias 字段
  # 连接参数（api_key / base_url / model / timeout）全部在 llm.yaml 中管理
  llm:
    # ▼ 直接引用 llm.yaml engines 中已定义的 alias ▼
    embed_engine:     ollama-embed   # llm.yaml engines[ollama-embed]  → qwen3-embedding:8b @ 192.168.0.222:11434
    summarize_engine: vllm-qwen3    # llm.yaml engines[vllm-qwen3]    → Qwen3.5-35B @ 192.168.0.222:8003
    rerank_engine:    vllm-qwen3    # llm.yaml engines[vllm-qwen3]    → 同上

    # Embedding 维度 — 须与 embed_engine 的 embedding_model 输出维度一致
    # 同时须与 llm.yaml vector_store.milvus.vector_size 保持一致（当前均为 1536）
    embed_dimensions: 1536          # qwen3-embedding:8b → 1536
    embed_batch_size: 32            # 每批次请求数量

    # 本地 BGE（仅 embed_engine: bge_local 时生效，不走 llm.yaml）
    bge_local:
      model: BAAI/bge-m3
      device: cpu
      batch_size: 16

  # ── 文档解析 ─────────────────────────────────────────────────────
  parser:
    backend: docling               # docling | unstructured | markitdown
    docling:
      do_ocr: true
      do_table_structure: true
      table_mode: accurate         # accurate | fast
      ocr_lang: [zh, en]
    unstructured:
      strategy: hi_res             # hi_res | fast | auto
      api_url: ""
      api_key: ""
    markitdown:
      enable_plugins: true

  # ── 分块策略 ─────────────────────────────────────────────────────
  chunker:
    strategy: structural                 # auto | structural | semantic | sentence | fixed
    # auto: 有标题→structural，无标题→semantic
    structural:
      min_size: 100
      max_size: 1500
      levels: [1, 2, 3]
      include_heading: true
    semantic:
      backend: chonkie
      threshold: 0.5
      target_size: 512
      max_size: 800
    sentence:
      chunk_size: 512
      chunk_overlap: 64
    fixed:
      chunk_size: 512
      chunk_overlap: 64
    contextual_enhancement:
      enabled: false               # 开启后 LLM 为每个 chunk 生成上下文描述
      use_prompt_cache: true
      batch_size: 10
      prompt: "请用1-2句话描述以下片段的主题和关键信息，不要复述原文：\n{chunk_text}"

  # ── 向量存储 ─────────────────────────────────────────────────────
  # use_global=true 时优先使用 llm.yaml vector_store 节的连接参数
  # collection 字段可覆盖 llm.yaml 中的 collection 名称
  vector_store:
    use_global: true               # true = 优先使用 llm.yaml vector_store 配置
    collection: kb_chunks          # 覆盖 llm.yaml 的 collection（留空则用 llm.yaml 原值）
    # ── 以下配置仅在 use_global=false 或 llm.yaml 无 vector_store 时生效 ──
    backend: qdrant                # qdrant | milvus | chroma
    qdrant:
      mode: embedded               # embedded | server
      path: ./data/qdrant
      url: http://localhost:6333
    milvus:
      mode: lite                   # lite(本地文件) | standalone(服务器)
      uri: ./data/milvus.db
    chroma:
      mode: persistent
      path: ./data/chroma

  # ── 关键词检索（BM25）───────────────────────────────────────────
  keyword_store:
    backend: memory                # elasticsearch | opensearch | memory
    elasticsearch:
      url: http://localhost:9200
      index_prefix: kb_
      username: ""
      password: ""
      analyzer: ik_max_word        # ik_max_word（中文）| standard
    opensearch:
      url: http://localhost:9200
      index_prefix: kb_
      username: ""
      password: ""
    memory:
      persist: true
      path: ./data/bm25.pkl

  # ── 知识图谱 ─────────────────────────────────────────────────────
  graph:
    enabled: true
    per_document: true             # 每个文档构建独立子图
    workspace_level: true          # 整个 workspace 构建汇总图
    store:
      backend: sqlite              # neo4j | sqlite | memory
      neo4j:
        uri: bolt://localhost:7687
        user: neo4j
        password: password
        database: neo4j
      sqlite:
        path: ./data/graph.db
    builder:
      extract_entities: true
      extract_relations: true
      resolve_entities: true
      build_communities: true

  # ── 重排序 ───────────────────────────────────────────────────────
  reranker:
    enabled: true
    backend: llm                   # bge | cohere | llm | none
    top_n: 5
    bge:
      model: BAAI/bge-reranker-v2-m3
      device: cpu
    cohere:
      model: rerank-multilingual-v3.0
      api_key: ""

  # ── 混合检索融合参数 ─────────────────────────────────────────────
  retrieval:
    vector_top_k: 20
    keyword_top_k: 20
    graph_top_k: 10
    fusion: rrf                    # rrf（Reciprocal Rank Fusion）| weighted
    rrf_k: 60
    weights:
      vector: 0.5
      keyword: 0.3
      graph: 0.2
    enable_graph_retrieval: true

  # ── 权限管理 ─────────────────────────────────────────────────────
  permissions:
    enabled: true
    db:
      backend: sqlite
      url: ./data/workspace.db

  # ── 文件管理 ─────────────────────────────────────────────────────
  file_management:
    db_url: ./data/kb_files.db
    storage:
      base_path: ./data/files
      keep_versions: 10            # 保留最近 N 个历史版本原始文件；0=不保留
    summary:
      enabled: true
      generate_diff: true
      max_input_chars: 3000
    audit:
      retention_days: 365          # 0 = 永久保留
